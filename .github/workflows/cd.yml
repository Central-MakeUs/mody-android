name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::잘못된 태그 형식: $GITHUB_REF_NAME (올바른 예: v1.2.3)"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "${GITHUB_REF_NAME#v}"
          if (( 10#$MAJOR > 99 || 10#$MINOR > 99 || 10#$PATCH > 99 )); then
            echo "::error::각 자리는 0~99만 허용: $GITHUB_REF_NAME (오타 의심)"
            exit 1
          fi

  deploy:
    name: Build & Deploy
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"          # v1.2.3 -> 1.2.3
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          echo "VERSION_NAME=$TAG" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$((10#$MAJOR*10000 + 10#$MINOR*100 + 10#$PATCH))" >> "$GITHUB_ENV"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: mody
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "버전: ${{ github.ref_name }}\n커밋: ${{ github.sha }}\n작성자: ${{ github.actor }}"

      - name: Notify Slack (성공)
        if: false  # 임시 비활성화 (알림 끔)
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *배포 완료*\n버전: ${{ github.ref_name }}\n커밋: <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n배포자: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack (실패)
        if: false  # 임시 비활성화 (알림 끔)
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *배포 실패*\n버전: ${{ github.ref_name }}\n커밋: <https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n작성자: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
