name: CD

# 태그로 배포 트랙 분기
#   vX.Y.Z-dev  -> Firebase App Distribution (debug APK, 내부 테스트)
#   vX.Y.Z      -> Google Play Store (release AAB, 출시)  [미구성: Play 등록 후 활성화]
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # 허용: v1.2.3 (release) | v1.2.3-dev (Firebase)
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-dev)?$ ]]; then
            echo "::error::잘못된 태그: $GITHUB_REF_NAME (예: v1.2.3 또는 v1.2.3-dev)"
            exit 1
          fi
          CORE="${GITHUB_REF_NAME#v}"; CORE="${CORE%-dev}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CORE"
          if (( 10#$MAJOR > 99 || 10#$MINOR > 99 || 10#$PATCH > 99 )); then
            echo "::error::각 자리는 0~99만 허용: $GITHUB_REF_NAME (오타 의심)"
            exit 1
          fi

  firebase:
    name: Firebase (dev)
    needs: validate
    if: endsWith(github.ref_name, '-dev')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 이후 스텝에 인증 git 작업 없음 → 토큰을 .git/config 에 남기지 않는다
          persist-credentials: false

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        run: |
          CORE="${GITHUB_REF_NAME#v}"; CORE="${CORE%-dev}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CORE"
          echo "VERSION_NAME=$CORE" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$((10#$MAJOR*10000 + 10#$MINOR*100 + 10#$PATCH))" >> "$GITHUB_ENV"

      - name: Resolve release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # actions/checkout이 태그 ref를 커밋 SHA로 덮어써 annotated 메시지가 유실되므로
          # (actions/checkout#290) 로컬 git이 아닌 GitHub API로 태그 객체의 메시지를 조회한다.
          # annotated 태그면 ref가 tag 객체를 가리키고, lightweight면 commit → 빈값 → 폴백.
          NOTES=""
          TAG_OBJ_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}" \
            --jq 'select(.object.type == "tag") | .object.sha' 2>/dev/null || true)
          if [ -n "$TAG_OBJ_SHA" ]; then
            NOTES=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_OBJ_SHA}" --jq '.message' 2>/dev/null || true)
          fi
          if [ -z "${NOTES//[[:space:]]/}" ]; then
            NOTES="$GITHUB_REF_NAME (커밋 ${GITHUB_SHA:0:7})"
          fi
          printf '%s\n' "$NOTES" > release_notes.txt
          echo "----- release notes -----"; cat release_notes.txt

      - name: Build Debug APK
        env:
          # 카카오 네이티브 키 주입(미주입 시 빈 값으로 빌드되어 카카오 로그인/공유 동작 안 함)
          KAKAO_NATIVE_KEY_DEV: ${{ secrets.KAKAO_NATIVE_KEY_DEV }}
        run: ./gradlew assembleDebug

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: jagsim
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotesFile: release_notes.txt

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
        run: |
          if [ "$STATUS" = "success" ]; then
            EMOJI=":rocket:"; TITLE="테스트앱 배포 완료"
          else
            EMOJI=":x:"; TITLE="테스트앱 배포 실패"
          fi
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${EMOJI} Mody ${TITLE}\n버전: ${GITHUB_REF_NAME}\n커밋: ${GITHUB_SHA:0:7} (${GITHUB_ACTOR})\nFirebase App Distribution · 그룹 jagsim\"}" \
            "$SLACK_WEBHOOK_URL" || true

  playstore:
    name: Play Store (release)
    needs: validate
    if: ${{ !endsWith(github.ref_name, '-dev') }}
    runs-on: ubuntu-latest
    steps:
      # TODO(Play 출시 준비되면 활성화):
      #   1) Play Console 앱 등록 + 최초 1회 수동 업로드
      #   2) Service Account JSON -> secrets.PLAY_SERVICE_ACCOUNT_JSON
      #   3) 서명 keystore base64 -> secret, 디코드 스텝 추가
      #   4) ./gradlew bundleRelease 후 Gradle Play Publisher 로 업로드
      - name: Not configured
        run: |
          echo "::error::Play Store 배포 미구성. release 태그($GITHUB_REF_NAME) 배포하려면 Service Account/Play Console 설정 필요."
          echo "내부 테스트는 -dev 태그(예: ${GITHUB_REF_NAME}-dev) 사용."
          exit 1
