name: CD

# 태그로 배포 트랙 분기
#   vX.Y.Z-dev  -> Firebase App Distribution (debug APK, 내부 테스트)
#   vX.Y.Z      -> Google Play Store (release AAB, 출시)  [미구성: Play 등록 후 활성화]
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # 허용: v1.2.3 (release) | v1.2.3-dev (Firebase)
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-dev)?$ ]]; then
            echo "::error::잘못된 태그: $GITHUB_REF_NAME (예: v1.2.3 또는 v1.2.3-dev)"
            exit 1
          fi
          CORE="${GITHUB_REF_NAME#v}"; CORE="${CORE%-dev}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CORE"
          if (( 10#$MAJOR > 99 || 10#$MINOR > 99 || 10#$PATCH > 99 )); then
            echo "::error::각 자리는 0~99만 허용: $GITHUB_REF_NAME (오타 의심)"
            exit 1
          fi

  firebase:
    name: Firebase (dev)
    needs: validate
    if: endsWith(github.ref_name, '-dev')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        run: |
          CORE="${GITHUB_REF_NAME#v}"; CORE="${CORE%-dev}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CORE"
          echo "VERSION_NAME=$CORE" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$((10#$MAJOR*10000 + 10#$MINOR*100 + 10#$PATCH))" >> "$GITHUB_ENV"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: mody
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "버전: ${{ github.ref_name }}\n커밋: ${{ github.sha }}\n작성자: ${{ github.actor }}"

  playstore:
    name: Play Store (release)
    needs: validate
    if: ${{ !endsWith(github.ref_name, '-dev') }}
    runs-on: ubuntu-latest
    steps:
      # TODO(Play 출시 준비되면 활성화):
      #   1) Play Console 앱 등록 + 최초 1회 수동 업로드
      #   2) Service Account JSON -> secrets.PLAY_SERVICE_ACCOUNT_JSON
      #   3) 서명 keystore base64 -> secret, 디코드 스텝 추가
      #   4) ./gradlew bundleRelease 후 Gradle Play Publisher 로 업로드
      - name: Not configured
        run: |
          echo "::error::Play Store 배포 미구성. release 태그($GITHUB_REF_NAME) 배포하려면 Service Account/Play Console 설정 필요."
          echo "내부 테스트는 -dev 태그(예: ${GITHUB_REF_NAME}-dev) 사용."
          exit 1
