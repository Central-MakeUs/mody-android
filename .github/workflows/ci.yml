name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Debug
        run: ./gradlew assembleDebug

      - name: Lint
        run: ./gradlew lint

      - name: Notify Slack (실패 시)
        if: false  # 임시 비활성화 (알림 끔)
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *PR 빌드 실패*\nPR: <${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>\n작성자: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
